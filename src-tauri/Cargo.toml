[package]
name = "machdoch"
version = "0.1.0"
description = "Local-first OS AI agent desktop shell"
authors = ["machdoch contributors"]
edition = "2021"

[lib]
name = "machdoch_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2.7.0"
tauri-plugin-store = "2.4.2"
