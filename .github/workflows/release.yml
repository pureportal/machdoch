name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json
      - src-tauri/tauri.conf.json
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      release_id: ${{ steps.release.outputs.release_id }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      version: ${{ steps.version.outputs.version }}
      publish_on_success: ${{ steps.release.outputs.publish_on_success }}
      delete_on_failure: ${{ steps.release.outputs.delete_on_failure }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version and ensure release tag
        id: version
        shell: bash
        env:
          CURRENT_SHA: ${{ github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');

          const beforeSha = process.env.BEFORE_SHA ?? '';
          const currentSha = process.env.CURRENT_SHA;
          const defaultBranch = process.env.DEFAULT_BRANCH;
          const eventName = process.env.EVENT_NAME;
          const outputPath = process.env.GITHUB_OUTPUT;
          const refName = process.env.REF_NAME;
          const refType = process.env.REF_TYPE;

          const setOutput = (name, value) => {
            fs.appendFileSync(outputPath, `${name}=${value}\n`);
          };

          const readJsonFile = (path) => JSON.parse(fs.readFileSync(path, 'utf8'));
          const readVersionAtRevision = (revision, path) => {
            try {
              return (
                JSON.parse(
                  execFileSync('git', ['show', `${revision}:${path}`], {
                    encoding: 'utf8',
                    stdio: ['ignore', 'pipe', 'ignore'],
                  }),
                ).version ?? ''
              );
            } catch {
              return '';
            }
          };

          const packageVersion = readJsonFile('package.json').version ?? '';
          const tauriVersion = readJsonFile('src-tauri/tauri.conf.json').version ?? '';

          if (!packageVersion) {
            console.error('package.json is missing a version.');
            process.exit(1);
          }

          if (!tauriVersion) {
            console.error('src-tauri/tauri.conf.json is missing a version.');
            process.exit(1);
          }

          if (packageVersion !== tauriVersion) {
            console.error(
              `package.json version ${packageVersion} does not match src-tauri/tauri.conf.json version ${tauriVersion}.`,
            );
            process.exit(1);
          }

          const version = packageVersion;
          const tagName = `v${version}`;

          if (refType === 'tag') {
            if (refName !== tagName) {
              console.error(
                `Expected tag ${tagName} for version ${version}, but this workflow ran for ${refName}.`,
              );
              process.exit(1);
            }

            setOutput('should_release', 'true');
            setOutput('tag_name', tagName);
            setOutput('version', version);
            process.exit(0);
          }

          if (refName !== defaultBranch) {
            console.error(
              `Releases can only be created from ${defaultBranch} or a version tag. This workflow ran for ${refName}.`,
            );
            process.exit(1);
          }

          if (eventName === 'push') {
            const hasBeforeRevision = beforeSha.length > 0 && !/^0+$/.test(beforeSha);

            if (hasBeforeRevision) {
              const previousPackageVersion = readVersionAtRevision(beforeSha, 'package.json');
              const previousTauriVersion = readVersionAtRevision(beforeSha, 'src-tauri/tauri.conf.json');

              if (
                previousPackageVersion === version &&
                previousTauriVersion === version
              ) {
                console.log(
                  `Version stayed at ${version}; skipping the release pipeline for this push.`,
                );
                setOutput('should_release', 'false');
                setOutput('tag_name', tagName);
                setOutput('version', version);
                process.exit(0);
              }
            }
          }

          let existingTagCommit = '';

          try {
            existingTagCommit = execFileSync('git', ['rev-list', '-n', '1', tagName], {
              encoding: 'utf8',
              stdio: ['ignore', 'pipe', 'ignore'],
            }).trim();
          } catch {
            existingTagCommit = '';
          }

          if (existingTagCommit && existingTagCommit !== currentSha) {
            console.error(
              `Tag ${tagName} already exists at ${existingTagCommit}, but this workflow is building ${currentSha}. Bump the app version or remove the conflicting tag.`,
            );
            process.exit(1);
          }

          if (!existingTagCommit) {
            execFileSync('git', ['config', 'user.name', 'github-actions[bot]'], {
              stdio: 'inherit',
            });
            execFileSync(
              'git',
              ['config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'],
              { stdio: 'inherit' },
            );
            execFileSync('git', ['tag', '-a', tagName, currentSha, '-m', `Release ${tagName}`], {
              stdio: 'inherit',
            });
            execFileSync('git', ['push', 'origin', `refs/tags/${tagName}`], {
              stdio: 'inherit',
            });
          }

          setOutput('should_release', 'true');
          setOutput('tag_name', tagName);
          setOutput('version', version);
          NODE

      - name: Create or reuse GitHub release
        id: release
        if: steps.version.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          RELEASE_TITLE: machdoch ${{ steps.version.outputs.tag_name }}
        shell: bash
        run: |
          if gh release view "$TAG_NAME" --json databaseId,isDraft >/dev/null 2>&1; then
            release_id="$(gh release view "$TAG_NAME" --json databaseId --jq '.databaseId')"
            is_draft="$(gh release view "$TAG_NAME" --json isDraft --jq '.isDraft')"

            gh release edit "$TAG_NAME" --title "$RELEASE_TITLE"

            if [ "$is_draft" = "true" ]; then
              echo "publish_on_success=true" >> "$GITHUB_OUTPUT"
            else
              echo "publish_on_success=false" >> "$GITHUB_OUTPUT"
            fi

            echo "delete_on_failure=false" >> "$GITHUB_OUTPUT"
          else
            gh release create "$TAG_NAME" \
              --title "$RELEASE_TITLE" \
              --generate-notes \
              --draft

            release_id="$(gh release view "$TAG_NAME" --json databaseId --jq '.databaseId')"
            echo "publish_on_success=true" >> "$GITHUB_OUTPUT"
            echo "delete_on_failure=true" >> "$GITHUB_OUTPUT"
          fi

          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundle_patterns: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*-setup.exe
          - platform: ubuntu-24.04
            bundle_patterns: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev libgbm-dev librsvg2-dev libpipewire-0.3-dev libspa-0.2-dev patchelf

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build release assets
        shell: bash
        run: pnpm tauri build

      - name: List bundle outputs
        shell: bash
        run: |
          ls -la src-tauri/target/release/bundle || true
          find src-tauri/target/release/bundle -maxdepth 3 -type f || true

      - name: Collect bundle artifacts
        id: bundles
        shell: bash
        run: |
          shopt -s nullglob
          files=()
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for file in $pattern; do
              if [ -f "$file" ]; then
                files+=("$file")
              fi
            done
          done <<'EOF'
          ${{ matrix.bundle_patterns }}
          EOF

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi

          printf "paths<<EOF\n%s\nEOF\n" "$(printf "%s\n" "${files[@]}")" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        shell: bash
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            gh release upload "$TAG_NAME" "$file" --clobber
          done <<'EOF'
          ${{ steps.bundles.outputs.paths }}
          EOF

      - name: Create stable release aliases
        id: aliases
        shell: bash
        run: |
          rm -rf release-aliases
          mkdir -p release-aliases

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            case "$file" in
              *.msi)
                cp "$file" release-aliases/machdoch-windows-x64.msi
                ;;
              *-setup.exe)
                cp "$file" release-aliases/machdoch-windows-x64-setup.exe
                ;;
              *.deb)
                cp "$file" release-aliases/machdoch-linux-amd64.deb
                ;;
              *.rpm)
                cp "$file" release-aliases/machdoch-linux-x86_64.rpm
                ;;
              *.AppImage)
                cp "$file" release-aliases/machdoch-linux-amd64.AppImage
                ;;
              *)
                echo "No stable alias configured for $file"
                ;;
            esac
          done <<'EOF'
          ${{ steps.bundles.outputs.paths }}
          EOF

          mapfile -t aliases < <(find release-aliases -maxdepth 1 -type f | sort)

          if [ ${#aliases[@]} -eq 0 ]; then
            echo "No stable release aliases were created."
            exit 1
          fi

          printf "paths<<EOF\n%s\nEOF\n" "$(printf "%s\n" "${aliases[@]}")" >> "$GITHUB_OUTPUT"

      - name: Upload stable release aliases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        shell: bash
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            gh release upload "$TAG_NAME" "$file" --clobber
          done <<'EOF'
          ${{ steps.aliases.outputs.paths }}
          EOF

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-${{ matrix.platform }}.spdx.json
          output-file: sbom-${{ matrix.platform }}.spdx.json
          format: spdx-json
          upload-release-assets: false

      - name: Attest build provenance
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            ${{ steps.bundles.outputs.paths }}
            ${{ steps.aliases.outputs.paths }}

      - name: Attest SBOM
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: actions/attest-sbom@v3
        with:
          subject-path: |
            ${{ steps.bundles.outputs.paths }}
            ${{ steps.aliases.outputs.paths }}
          sbom-path: sbom-${{ matrix.platform }}.spdx.json

  publish-release:
    needs: [prepare-release, build-and-release]
    if: needs.prepare-release.outputs.should_release == 'true' && needs.prepare-release.outputs.publish_on_success == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: gh release edit "$TAG_NAME" --draft=false --repo "$GITHUB_REPOSITORY"

  cleanup-release:
    name: Cleanup Draft Release on Failure
    needs: [prepare-release, build-and-release, publish-release]
    if: always() && needs.prepare-release.outputs.should_release == 'true' && failure() && needs.prepare-release.outputs.delete_on_failure == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete draft release created by this workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: gh release delete "$TAG_NAME" --yes --repo "$GITHUB_REPOSITORY"
