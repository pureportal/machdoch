name: Build Installers

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact_name: installers-windows
            bundle_patterns: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*-setup.exe
          - platform: ubuntu-22.04
            artifact_name: installers-linux
            bundle_patterns: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List bundle outputs
        shell: bash
        run: |
          ls -la src-tauri/target/release/bundle || true
          find src-tauri/target/release/bundle -maxdepth 3 -type f || true

      - name: Collect bundle artifacts
        id: bundles
        shell: bash
        run: |
          shopt -s nullglob
          files=()
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for file in $pattern; do
              if [ -f "$file" ]; then
                files+=("$file")
              fi
            done
          done <<'EOF'
          ${{ matrix.bundle_patterns }}
          EOF

          if [ ${#files[@]} -eq 0 ]; then
            echo "No installer artifacts found."
            exit 1
          fi

          printf "paths<<EOF\n%s\nEOF\n" "$(printf "%s\n" "${files[@]}")" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.bundles.outputs.paths }}
          if-no-files-found: error

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-${{ matrix.platform }}.spdx.json
          output-file: sbom-${{ matrix.platform }}.spdx.json
          format: spdx-json
          upload-release-assets: false

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.bundles.outputs.paths }}

      - name: Attest SBOM
        uses: actions/attest-sbom@v3
        with:
          subject-path: ${{ steps.bundles.outputs.paths }}
          sbom-path: sbom-${{ matrix.platform }}.spdx.json
